# MindHandsHarness v2 configuration

harness_version: 2
harness_mode: coordinator_executor_runtime
default_language: en-US

roles:
  standing:
    - coordinator
    - executor
  executor_modes:
    - inspect
    - execute
    - verify
    - review

context_policy:
  default_loading: progressive
  coordinator_raw_log_limit: 0
  full_read_line_limit: 200
  use_project_map_before_source: true
  use_rtk_for_large_files: true

memory_policy:
  executor_can_write_memory: false
  coordinator_applies_memory: true
  scripts_enforce_format: true
  only_verified_facts: true

runtime_policy:
  state_file: .harness/runtime/state.json
  sessions_dir: .harness/runtime/sessions
  append_only_events: true
  save_large_outputs_to_task_logs: true

skills_policy:
  registry_only: true
  copy_external_skills: false
  load_policy: on_demand
